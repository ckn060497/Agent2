<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sage — AI Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #F6F2EA;
    --surface: #FFFFFF;
    --ink: #26221D;
    --muted: #8B8378;
    --line: #E7DFD1;
    --clay: #C96442;
    --clay-soft: #F1DED2;
    --clay-soft-2: #F7E9DD;
    --font-display: 'Fraunces', serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html, body{ height:100%; }

  body{
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-body);
    display:flex;
    justify-content:center;
    height:100vh;
    overflow:hidden;
  }

  .app{
    width:100%;
    max-width: 780px;
    height:100%;
    display:flex;
    flex-direction:column;
    background: var(--bg);
  }

  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 22px 28px 18px;
    border-bottom: 1px solid var(--line);
  }

  .brand{
    display:flex;
    align-items:center;
    gap: 14px;
  }

  .mark{
    position: relative;
    width: 38px; height: 38px;
    border-radius: 50%;
    background: radial-gradient(circle at 32% 30%, #E8896E, var(--clay));
    flex-shrink:0;
  }
  .mark::after{
    content:'';
    position:absolute;
    inset:-5px;
    border-radius: 50%;
    border: 1px solid var(--clay);
    opacity: 0.35;
    animation: breathe 3.2s ease-in-out infinite;
  }
  @keyframes breathe{
    0%, 100%{ transform: scale(1); opacity: 0.35; }
    50%{ transform: scale(1.12); opacity: 0.1; }
  }

  .brand-text h1{
    font-family: var(--font-display);
    font-size: 1.25rem;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .brand-text span{
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  .new-chat{
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--line);
    padding: 9px 16px;
    border-radius: 999px;
    cursor: pointer;
    transition: border-color 0.2s ease, color 0.2s ease;
  }
  .new-chat:hover{ border-color: var(--clay); color: var(--clay); }
  .new-chat:focus-visible, button:focus-visible, textarea:focus-visible{
    outline: 2px solid var(--clay);
    outline-offset: 2px;
  }

  .messages{
    flex:1;
    overflow-y: auto;
    padding: 28px 28px 12px;
    display:flex;
    flex-direction: column;
    gap: 22px;
  }
  .messages::-webkit-scrollbar{ width: 6px; }
  .messages::-webkit-scrollbar-thumb{ background: var(--line); border-radius: 3px; }

  .empty-state{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    color: var(--muted);
    gap: 14px;
    padding: 0 20px;
  }
  .empty-state h2{
    font-family: var(--font-display);
    font-size: 1.6rem;
    font-weight: 500;
    color: var(--ink);
  }
  .empty-state p{ font-size: 0.92rem; max-width: 38ch; line-height: 1.6; }

  .suggestions{
    display:flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content:center;
    margin-top: 6px;
  }
  .chip{
    font-family: var(--font-body);
    font-size: 13px;
    color: var(--ink);
    background: var(--surface);
    border: 1px solid var(--line);
    padding: 9px 16px;
    border-radius: 999px;
    cursor: pointer;
    transition: border-color 0.2s ease, transform 0.2s ease;
  }
  .chip:hover{ border-color: var(--clay); transform: translateY(-1px); }

  .row{ display:flex; gap: 14px; max-width: 100%; }
  .row.user{ flex-direction: row-reverse; }

  .avatar{
    width: 30px; height: 30px;
    border-radius: 50%;
    flex-shrink: 0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
  }
  .row.assistant .avatar{
    background: radial-gradient(circle at 32% 30%, #E8896E, var(--clay));
    color: #fff;
  }
  .row.user .avatar{
    background: var(--ink);
    color: var(--bg);
  }

  .bubble{
    max-width: 78%;
    padding: 14px 18px;
    border-radius: 14px;
    font-size: 0.96rem;
    line-height: 1.65;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .row.assistant .bubble{
    background: var(--surface);
    border: 1px solid var(--line);
    border-top-left-radius: 4px;
  }
  .row.user .bubble{
    background: var(--clay-soft);
    border-top-right-radius: 4px;
  }

  .bubble code{
    font-family: var(--font-mono);
    font-size: 0.85em;
    background: var(--clay-soft-2);
    padding: 2px 6px;
    border-radius: 4px;
  }
  .bubble pre{
    background: #1E1B17;
    color: #F0EBE3;
    padding: 14px 16px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 10px 0;
  }
  .bubble pre code{
    background: none;
    padding: 0;
    color: inherit;
  }
  .bubble strong{ font-weight: 600; }

  .typing{
    display:flex;
    gap: 5px;
    padding: 6px 2px;
  }
  .typing span{
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--clay);
    opacity: 0.5;
    animation: bounce 1.1s infinite ease-in-out;
  }
  .typing span:nth-child(2){ animation-delay: 0.15s; }
  .typing span:nth-child(3){ animation-delay: 0.3s; }
  @keyframes bounce{
    0%, 60%, 100%{ transform: translateY(0); opacity: 0.4; }
    30%{ transform: translateY(-5px); opacity: 1; }
  }

  .error-note{
    font-family: var(--font-mono);
    font-size: 12px;
    color: #B3492E;
    background: #FBEAE4;
    border: 1px solid #EFC9BB;
    padding: 10px 14px;
    border-radius: 8px;
  }

  .composer{
    padding: 16px 28px 24px;
    border-top: 1px solid var(--line);
  }
  .composer-inner{
    display:flex;
    align-items:flex-end;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 10px 10px 10px 20px;
    transition: border-color 0.2s ease;
  }
  .composer-inner:focus-within{ border-color: var(--clay); }

  textarea{
    flex:1;
    border: none;
    outline: none;
    resize: none;
    background: transparent;
    font-family: var(--font-body);
    font-size: 0.96rem;
    color: var(--ink);
    line-height: 1.5;
    max-height: 160px;
    padding: 6px 0;
  }
  textarea::placeholder{ color: var(--muted); }

  .send-btn{
    width: 38px; height: 38px;
    border-radius: 50%;
    border: none;
    background: var(--ink);
    color: var(--bg);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    flex-shrink:0;
    transition: background 0.2s ease, transform 0.15s ease;
  }
  .send-btn:hover:not(:disabled){ background: var(--clay); }
  .send-btn:disabled{ opacity: 0.35; cursor: not-allowed; }
  .send-btn svg{ width: 16px; height: 16px; }

  .hint{
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    text-align:center;
    margin-top: 10px;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation: none !important; transition: none !important; }
  }

  @media (max-width: 560px){
    header{ padding: 18px 18px 14px; }
    .messages{ padding: 20px 18px 12px; }
    .composer{ padding: 14px 18px 20px; }
    .bubble{ max-width: 86%; }
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="brand">
      <div class="mark"></div>
      <div class="brand-text">
        <h1>Sage</h1>
        <span>AI ASSISTANT</span>
      </div>
    </div>
    <button class="new-chat" id="newChatBtn">New chat</button>
  </header>

  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">
      <h2>What's on your mind?</h2>
      <p>Ask a question, brainstorm an idea, or paste something you'd like help with.</p>
      <div class="suggestions">
        <button class="chip" data-prompt="Explain quantum computing simply">Explain quantum computing simply</button>
        <button class="chip" data-prompt="Help me write a short thank-you note">Write a thank-you note</button>
        <button class="chip" data-prompt="Give me 5 tips to focus better while working">Tips to focus better</button>
      </div>
    </div>
  </div>

  <div class="composer">
    <div class="composer-inner">
      <textarea id="input" rows="1" placeholder="Message Sage..."></textarea>
      <button class="send-btn" id="sendBtn" aria-label="Send message">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
      </button>
    </div>
    <div class="hint">Enter to send · Shift + Enter for a new line</div>
  </div>
</div>

<script>
(function(){
  const messagesEl = document.getElementById('messages');
  const emptyState = document.getElementById('emptyState');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const newChatBtn = document.getElementById('newChatBtn');

  let history = [];
  let isStreaming = false;

  function autoGrow(){
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 160) + 'px';
  }
  input.addEventListener('input', autoGrow);

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      input.value = chip.getAttribute('data-prompt');
      sendMessage();
    });
  });

  newChatBtn.addEventListener('click', () => {
    history = [];
    messagesEl.innerHTML = '';
    messagesEl.appendChild(emptyState);
    emptyState.style.display = 'flex';
    input.value = '';
    autoGrow();
  });

  function escapeHtml(str){
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  // Minimal, safe formatting: fenced code blocks, inline code, bold
  function formatContent(text){
    const escaped = escapeHtml(text);
    const withBlocks = escaped.replace(/```([a-zA-Z0-9]*)\n([\s\S]*?)```/g, (m, lang, code) => {
      return `<pre><code>${code.trim()}</code></pre>`;
    });
    const withInline = withBlocks.replace(/`([^`]+)`/g, '<code>$1</code>');
    const withBold = withInline.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    return withBold;
  }

  function addRow(role, content){
    if (emptyState.parentNode) emptyState.style.display = 'none';
    const row = document.createElement('div');
    row.className = 'row ' + role;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'YOU' : 'S';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = formatContent(content);

    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  function addTypingRow(){
    const row = document.createElement('div');
    row.className = 'row assistant';
    row.id = 'typingRow';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'S';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';

    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTypingRow(){
    const row = document.getElementById('typingRow');
    if (row) row.remove();
  }

  function addError(message){
    const row = document.createElement('div');
    row.className = 'row assistant';
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'S';
    const note = document.createElement('div');
    note.className = 'error-note';
    note.textContent = message;
    row.appendChild(avatar);
    row.appendChild(note);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function sendMessage(){
    const text = input.value.trim();
    if (!text || isStreaming) return;

    addRow('user', text);
    history.push({ role: 'user', content: text });
    input.value = '';
    autoGrow();

    isStreaming = true;
    sendBtn.disabled = true;
    addTypingRow();

    try{
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          system: 'You are Sage, a knowledgeable, thoughtful assistant. Answer clearly and directly across any topic — general knowledge, explanations, writing, math, coding, advice, and current events. Use web search when a question depends on up-to-date or real-time information. Keep answers well-organized and no longer than they need to be.',
          messages: history,
          tools: [{ type: 'web_search_20250305', name: 'web_search' }]
        })
      });

      const data = await response.json();
      removeTypingRow();

      if (!response.ok){
        addError('Something went wrong reaching the assistant. Please try again.');
        isStreaming = false;
        sendBtn.disabled = false;
        return;
      }

      const textBlocks = (data.content || [])
        .filter(item => item.type === 'text')
        .map(item => item.text)
        .join('\n');

      const replyText = textBlocks || 'I couldn\'t generate a response for that — try rephrasing.';
      addRow('assistant', replyText);
      history.push({ role: 'assistant', content: replyText });

    } catch(err){
      removeTypingRow();
      addError('Connection error. Check your network and try again.');
    }

    isStreaming = false;
    sendBtn.disabled = false;
    input.focus();
  }
})();
</script>

</body>
</html>
